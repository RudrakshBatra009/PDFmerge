name: Build PDFmerge

on:
  push:

jobs:
  build:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller --onefile --name PDFmerge mergepdf.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFmerge-${{ matrix.os }}
          path: dist/*